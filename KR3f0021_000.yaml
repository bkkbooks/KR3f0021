body:
  text: 曉菴新法天文算法類一推步之屬提要臣等謹案曉菴新法六卷國朝王錫闡撰錫闡字寅旭號餘不又號曉庵又號天同一生吳江人是書前一卷述句股割圜諸法後五卷皆推步七政交食凌犯之術觀其自序蓋成于明之末年故以崇禎元年戊辰為厯元以南京應天府為異差之元其分周天為三百八十四更以分弧為逐限以加減為從消創立新名雖頗涉臆撰然其時徐光啓等纂修新法聚訟盈庭錫闡獨閉戶著書潛心測算務求精符天象不屑屑于門户之分鈕琇觚賸稱其精究推步兼通中西之學遇天色晴霽輒登屋卧鴟吻間仰察星象竟夕不寐蓋亦覃思測驗之士梅文鼎勿菴厯算書記曰從來言交食只有食甚分數未及其邊惟王寅旭則以日月圓體分為三百六十度而論其食甚時所虧之邊凡幾何度今為推演其法頗為精確又稱近代厯學以吳江為最識解在青州之上云云案青州謂薛鳯祚鳯祚山東益都人為青州屬邑故也其推挹錫闡甚至逮康熙中御製數理精藴亦多採錫闡之説蓋其書雖疏密互見而其合者不可廢也書中於法有未備者每稍别見補遺然此本止于六卷實無所謂補遺者意其有佚篇歟乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀曉菴新法原序炎帝八節厯之始也而其書不傳黃帝顓頊虞夏殷周魯七厯先儒謂其偽作今七厯具存大指與漢厯相似而章蔀氣朔未覩其真其為漢人所托無疑太初三統法雖疏違而創始之功不可泯也劉洪薑岌次第闡明何祖專力表圭益稱精切自此南北厯家率能好學深思多所推論皆非淺近所及唐厯大衍稍親然開元甲子當食不食一行乃為諛詞以自解何如因差以求合乎至宋而厯分兩途有儒家之厯有厯家之厯儒者不知厯數而援虛理以立説術士不知厯理而為定法以驗天天經地緯躔離違合之原概未有得也國初元統造大統厯因郭守敬遺法增損不及百一豈以守敬之術果能度越前人乎守敬治厯首重測日余嘗取其表景反覆布算前後抵牾餘所創改多非密率在當日已有失食失推之咎况乎遺籍散亡法意無徴兼之年逺數盈違天漸逺安可因循不變耶元氏藝不逮郭在廷諸臣又不逮元卒使昭代大典踵陋襲偽雖有李德芳爭之然德芳不能推理而株守陳言無以相勝誠可嘆也近代端清世子鄭善夫邢雲鷺魏文奎皆有論述要亦不越守敬範圍至如陳壤托拾九執之餘津冷逢震墨守元會之畸見又何足以言厯乎萬厯季年西人利氏來歸頗工厯算崇禎初命禮臣徐光啓譯其書有厯指為法原厯表為法數書百餘卷數年而成遂盛行於世言厯者莫不奉為爼豆吾謂西厯善矣然以為測候精詳可也以為深知法意未可也循其理而求通可也安其誤而不辨不可也姑舉其概二分者春秋平氣之中二正者日道南北之中也大統以平氣授人時以盈縮定日躔法非謬也西人既用定氣則分正為一因譏中厯節氣差至二日夫中厯嵗差數強盈縮過多惡得無差然二日之異乃分正殊科非不知日行之朓朒而致誤也厯指直以怫已而譏之不知法意一也諸家造厯必有積年日法多寡任意牽合由人守敬去積年而起自辛巳屏日法而斷以萬分識誠卓也西厯命日之時以二十四命時之分以六十通計一日為分一千四百四十是復用日法矣至於刻法彼所無也近始每時四分之為一日之刻九十六彼先求度而後日尚未覺其繁施之中厯則窒矣反謂中厯百刻不適於用何也且日食時差法之九十有六與日刻之九十六何與乎而援以為據不知法意二也天體渾淪初無度分可指昔人因一日日躔命為一度日有疾徐斷以平行數本順天不可損益西人去周天五度有竒斂為三百六十不過取便割圜豈真天道固然而黨同伐異必曰日度為非詎知三百六十尚非弦弧之捷徑乎不知法意三也上古置閏恆於嵗終蓋厯術疏闊計嵗以置閏也中古法日趨密始計月以置閏而閏於積終故舉中氣以定月而月無中氣者即為閏大統專用平氣置閏必得其月新法改用定氣致一月有兩中氣之時一嵗有兩可閏之月若辛丑西厯者不亦盩乎夫月無平中氣者乃為積餘之終無定中氣者非其月也不能虛衷深考而以鹵莾之習侈支離之學是以歸餘之後氣尚在晦季冬中氣已入仲冬首春中氣將歸臘杪不得已而退朔一日以塞人望亦見其技之窮矣不知法意四也天正日躔本起子半後因嵗差厯丑及寅若夫合神之説乃星命家猥言明理者所不道西人自命厯宗何至反為所惑而天正日躔定起丑初乎况十二次舍命名悉依星家如隨節氣遞遷雖子午不妨異地而玄枵鳥咮亦無定位耶不知法意五也嵗實消長昉於統天郭氏用之而未知所以當用元氏去之而未知所以當去西人知以日行髙卑求之而未知以二道逺近求之得其一而遺其一當辨者一也嵗差不齊必緣天運緩促今欲歸之偶差豈前此諸家皆妄作乎黃白異距生交行之進退黃赤異距生嵗差之屈伸其理一也厯指已明於月何蔽於日當辨者二也日躔盈縮最高斡運古今不同揆之臆見必有定數不唯日躔月星亦應同理但行遲差微非畢生嵗月所可測度西人每詡數千年傳人不乏何以亦無定論當辨者三也日月去人時分逺近視徑因分大小則逺近大小宜為相似之比例西法日則逺近差多而視徑差少月則逺近差少而視徑差多因數求理難可相通當辨者四也日食變差機在交分西厯名交角日軌交分與月髙交分不同月髙交於本道與交於黃道者又不同厯指不詳其理厯表不著其數豈黃道一術足窮日食之變乎當辨者五也中限左右日月視差時或一東一西交廣以南日月視差時或一南一北此為視差異向與視差同向者加減逈别厯指豈以非所常遇故置不講耶萬一遇之則學者何從立算當辨者六也日光射物必有虛景虛景者光徑與實徑之所生也暗虛恆縮理不出此西人不知日有光徑僅以實徑求暗虛及至步推不符天驗復酌損徑分以希偶合當辨者七也月蝕定望唯食甚為然虧復四限距望有差日食稍離中限即食甚己非定朔至於虧復相去尤逺西厯乃言交食必在朔望不用朓朒次差西厯名次均加減過矣當辨者八也歲填熒惑以本天為全數日行規為嵗輪太白辰星以日行規為全數本天為嵗輪厯指又名伏見輪故測其遲速留退而知其去地逺近考於厯指數不盡合當辨者九也熒惑用日行髙卑變嵗輪大小理未悖也用自行髙卑變嵗輪大小則悖矣太白交周不過二百餘日辰星交周不過八十餘日厯指皆與嵗周相近法雖巧非也當辨者十也語云步厯甚難辨厯甚易蓋言象緯森羅得失無所遁也據彼所述亦未嘗自信無差五星經度或失二十餘分西法一十二分躔離表驗或失數分交食值此當失以刻計凌犯值此當失以日計矣故立法不久違錯頗多余於厯説已辨一二乃癸卯七月望食當既不既與夫失食失推者何異乎且譯書之初本言取西厯之材質歸大統之型範不謂盡墮成憲而專用西法如今日者也余故兼采中西去其疵纇參以己意著厯法六篇會通若干事考正若干事表明若干事增葺若干事立法若干事舊法雖舛而未可遽廢者兩存之理雖可知而非上下千年不得其數者闕之雖得其數而逺引古測未經目信者别見補遺而正文仍襲其故為日一百幾十有幾為文萬有千言非敢妄云窺其堂奧庶幾初學之津梁也或曰子雲稱雒下為聖人識者非之嗣是名厯代興業愈精而差愈見徒供人之彈射子今法成而彈射者至矣曰培岡阜者易為髙浚溪谷者易為深夫厯二千年來差愈見而法愈密非後人知勝於古也增修易善耳或者以吾法為標的則吾學明矣庸何傷昭陽單閼菊花開日曉菴氏自序朱氏彛尊明詩綜王錫闡字寅旭一字昭冥吳江人博綜羣書尤精厯象之學創新法候日月食較密於前人撰有厯説厯法大統法啓蒙圜解三辰儀晷志等書為人耿介拔俗詩亦不沿時習欽定四庫全書曉菴新法目録卷一勾股割圜變率通率卷二法數度法日法黃道諸數天周緯歲差列宿距星黃道經赤道辰次日躔諸數歲周厯周月離諸數月周轉交氣朔定名四孟節氣季中氣中氣四節氣四仲節氣望中氣朔弦一氣三候歲星諸數合轉交熒惑諸數合轉交填星諸數合轉交太白諸數合轉交辰星諸數合轉交逺近中準視徑中準晨夕隱見昏明伏見中準里差諸應厯元歲星黃道熒惑赤道填星日躔太白月離辰星里差卷三氣朔氣候交平朔弦望月離轉盈虛日躔入厯五星平合交轉通率日度平行分初末限躔離定度朓肭熒次行準月離朓肭定差差歲填惑後五星朓肭次行定度氣朔定日四正望定朔弦望五星定合退內外緯度月離正交度黃道內外度月五星交定度星月離緯度五緯度經緯變度兩道差度有黃道緯求赤道緯距日定躔離宿度黃道宿度黃道宿度赤道宿度赤道上躔離辰次赤道黃道九服里差命日大餘小餘卷四晝夜永短赤道日周日出入分升降差昏明分晝夜分五星逺近補逺近定分月星光體盈虧徑體準度分光體汜加分光體次加光體定分視徑日月徑分五星徑分暗虛月星伏見赤道離日日周見伏見準度升降較定伏極交分卷五氣差視差午位黃赤道限黃道午中差度黃道中限黃道中髙黃道髙極交分分日月髙度極交分三差月星髙交黃道晨昏日月徑晨昏徑差晨昏徑分月體光魄定向汜向次向定向變差附赤道黃道卷六日食南北較差日食分秒東西較差初虧復明食甚定時環既內金徑日食方位變差帶食帶食方位月月食食甚定時食月食分秒食初虧復明食既內月更點月方位帶帶食方位太白食日太白晨昏定徑食東西南北較差中食定時日淺深日中黑子帶出入二限方太白食日方位食帶食位凌犯主客定緯次緯較次距時定距定行分差法平距定合隂陽厯淺順逆厯犯晨昏徑分食正合掩食深凌逺近掩初終二限轉凌犯初終二限位時變差重合掩食凌犯方有犯無合升降昏旦隱見交會辰次赤道宿度黃道宿度辰次
