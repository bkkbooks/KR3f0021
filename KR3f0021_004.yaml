front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0021_WYG_004-1a, image: WYG0793/WYG0793-0496c.png}
body:
  text: 曉菴新法卷四吳江王錫闡撰晝夜永短赤道日周置全周加一日日躔赤道定行為赤道日周升降差内外度及北極髙兩正弦相因為實兩較弦相因為法而一為正弦得升降差㨗法内外度及北極髙兩切分相因為正弦得升降差凡求日月星升降差皆同法晝夜分置日躔升降差倍之如天周而一為晝夜差刻分損益五十刻為晝刻分春正後益秋正後損與百刻相減為夜刻分日出入分夜刻損半為日出前汎時加晝刻為日入前汎時置前汎時真刻分凡所得日出入時皆定刻分須借後篇氣差反損益之得真刻分下倣此覆求日出入次汎時兩汎時齊分者即以次汎時為定時若未合者又置次汎時真刻分求日出入後汎時次後兩汎時之較自因如前次兩汎時之較而一曰較差損益後汎時定刻分為日出定時次汎時在前汎時以上為益以下為損置日入定時内損本日日出定時為晝定刻分以日入定時減次日日出定時為夜定刻分昏明分置日出入定時真刻分進退四刻為昏明前汎時日出退日入進下皆倣此求其日躔赤道内外度益北極髙為外較如在一象限以上者與半周相減餘為外較後倣此損北極髙為内較兩申其較弦相從損半為先數以昏明準分損外較或内較較弦日在赤道南損内較赤道北損外較不及損者其日入後至日出前皆為朦朧分為次數如先數而一為矢得距中度次數大於先數者倍先數内減次數餘如先數而一為矢所得距中度過一象限先有弦矢而所得弧度當過一象限者以弧矢入割圜表申其弧度與半周相消即得所求弧度凡言所得弧度過一象限者皆依此法如天周而一為距中刻分以夜定刻損半相消曰朦朧分損益日出入定時得昏明次汎時置汎時真刻分覆求得後汎時置三汎時依日出入法得昏明定時昏明定時與日出入定時相消為朦朧定分求昏明中界者置日出入時真刻分進退二刻求内外兩較及先數以昏明準分之半損外較或内較較弦為次數依上法求之得昏明中界定時五星逺近補逺近定分五星中緯準分因交定正弦為正弦得中緯度逺近初分因中緯度正矢用損逺近次分餘為股初分因中緯度正弦為勾勾股求弦得逺近定分月星光體盈虧徑體準度日月星各以逺近中準因逺近定分得逺近定度又以視徑中準因逺近中準得徑體準度光體汎加分月星距日定度正弦因月星逺近定度為勾較弦因逺近定度損益日逺近定度為股月星距日過象限者益不及象限者損不足損者反損之所得汎加分過一象限勾股求弦為實距度置勾如實距度而一為正弦得光體汎加分㨗法置勾如股而一為切分得光體汎加分申其界分因股得實距光體次加分置日徑準度内損月星徑體準度為餘準如實距度而一為先數又置月星徑體準度如其逺近定度而一為次數用損先數為正弦得光體次加分光體定分兩加分及月星距日定度相從不及半周者即為光體定度過半周者與半周相減餘為光體定度在象限以下申正矢以上申正矢損全徑各為實如二十而一得光體定分捷法半其實退位即光體定分視徑日月徑分日月逺近定分與一度相減餘因日月視徑中準如定分而一損益視徑中準逺近定分過一度者損不及者益為徑弦得日月徑分用新法會通崇禎厯書以日月逺近初分與一度相減餘因徑差準分如初分而一得數視初分過一度者減不及者加加減於視徑中準為正弦得日月徑分又増法月逺近定分與逺近初分相減餘因月徑正弦如定分而一得數視定分強於初分者減弱於初分者加加減於月徑正弦仍為正弦得月徑次分五星徑分五星逺近定分與一度相減餘以五星視徑中準因之如定分而一損益視徑中準定分過一度者損不及者益為正弦得各星徑分闇虚置光徑準度去二度曰餘準倍日躔逺近定度如光徑餘準而一曰總率内減月離逺近定度餘倍之如總率而一為勾月離逺近定分為股勾股求弦弦分勾為全弦得闇虛分捷法半勾如股而一為切分得闇虛半徑月星伏見赤道離日日周置赤道日周順損逆益月星赤道離日定行得月星赤道離日日周伏見準度月星逺近初分與一度相減餘以伏見中準因之如初分而一損益伏見中準初分過一度者損不及者益為正弦得伏見準度用新法會通大統厯及崇禎厯書以伏見中準為正弦即得伏見準度升降較以晨夕日躔升降差晨以日出分為限夕以日入為限損益其赤道經度春正後升損降益秋正後升益降損為日躔赤道升降度以晨夕月星升降差損益其赤道經度視月星赤道内外度内度升損降益外度升益降損為月星赤道升降度日躔及月星兩升降度相減為升降較定伏見月離升降較在伏見準度以上者為見以下者為伏五星置升降較如赤道離日日周而一為升降前後刻分損益日出入分星在日西者為前損日出分星在日東者為後益日入分晨伏見者用因全周夕伏見者以減百刻餘因全周為赤道距中度象限以上申較弦加一度象限以下申其矢各為先數次以日躔内外度益北極髙為外較損北極髙為内較兩申其較較弦相從損半因先數日行赤道南損外較赤道北損内較各較弦為正弦得日入地度在各星伏見準度以上為見以下為伏大統厯但以黄道求五星伏見自具大統厯經今不贅用新法會通崇禎厯書求其五星伏見與月同法歲填熒惑順合伏太白辰星合退伏皆夕伏晨見月晦朔太白辰星順合伏皆晨伏夕見月及歲星晝見太白晝見經天皆不在伏見之限極交分置赤道較弦如黄道較弦而一為正弦得過北極弧交黄道分省曰極交分曉菴新法卷四
