body:
  text: 曉菴新法卷三吳江王錫闡撰氣朔氣候置歲周以距元積年因之為中積加氣應曰通積足宿紀總法纍去之得天正冬至大小餘分日曰大餘刻分曰小餘遞加候策足宿紀總法去之凡以甲子命日俱倣此得各氣候日分天正冬至大小餘分即為冬至初候日分加一候策為冬至中候日分加兩候策為冬至末候日分加三候策得小寒氣日分即為小寒初候日分餘倣此以土王策損四季中氣不及損者加宿紀總法損之凡以甲子命日者俱倣此得土王用事日分上考者以氣應減中積為通積足宿紀總法纍去之餘仍與宿紀總法相減得天正冬至大小餘分平朔弦望置中積加閏應曰閏積足月周纍去之得天正閏餘日分用損冬至得天正平朔大小餘分置天正閏餘加通閏即次年天正閏餘遞加弦策得各月平朔弦望日分上考者以閏應損中積為閏積足月周纍去之餘仍與月周相減得天正閏餘日分盈虛置各候以盈策遞加之得各日氣目刻分其無目之日曰盈日大統厯以無氣目之次日為盈日置平朔弦望以虛策纍加之得各日閏目刻分其重目之日曰虛日大統厯以兩目之次日為虛日日躔入厯置中積加厯應足厯周纍去之得天正冬至入厯日分半周已下為朓厯已上內減半周餘為朒厯月五星入轉倣此遞加候策得各氣候入厯日分加足全周去之凡足全周者俱倣此以閏餘損天正冬至入厯不及損者加厯周損之凡周率不及損者俱倣此即天正平朔入厯日分遞加弦策得各月平朔弦望入厯日分上考者以厯應損中積足厯周纍去之餘仍與厯周相減得天正冬至入厯日分月離交轉置中積加轉應損閏餘曰轉積足轉周纍去之得天正平朔入轉日分遞加弦策得各月平朔弦望入轉日分置平朔弦望入轉加轉終差得次月平朔弦望入厯日分置平朔入轉加轉半差朓改朒朒改朓得平望入轉日分以望求朔及兩弦互求者俱倣此上考者置中積損轉應加閏餘曰轉積足轉周纍去之餘仍與轉周相減得天正平朔入轉日分置中積加交應損閏餘曰交積足交周纍去之得天正平朔入交日分遞加望策得各月平朔望入交日分置平朔望入交加交終差得次月平朔望入交日分上考者置中積損交應加閏餘曰交積足交周纍去之餘仍與交周相減得天正平朔入轉日分五星平合置中積加合應足合周纍去之得天正冬至前合日分周減合周即後合日分以前合減冬至得至前平合日分後合加冬至得至後平合日分置平合加半周歲填熒惑為退望日分太白辰星為退合日分上考者以合應損中積足合周纍去之餘即後合日分與合周相減得前合日分交轉置中積加轉應為五星轉積足各星轉周纍去之得天正冬至各星入轉日分內減前合為至前平合加後合為至後平合各入轉日分上考者置中積損各星轉應為轉積足各星轉周纍去之餘仍與轉周相減得天正冬至各星入轉日分置中積加交應為五星交積足各星交周纍去之得天正冬至各星入交日分內減前合為至前平合加後合為至後平合各入交日分上考者置中積損各星交應為交積足各星交周纍去之餘仍與交周相減後天正冬至各星入交日分置平合交轉加合中為歲填熒惑退望太白辰星退合各入轉及入交日分辰周纍加合周得次合交轉日分通率日置用時以天正冬至減之為距至日分凡隨用一日時通曰用時以平朔平合減用時為距朔距合日分熒惑太白距合過宿紀總法者以平合減用時加宿紀總法為距合日分置距朔距合以朔合入厯及交轉加之為用時入厯及交轉日分度置距至命日為度即為距至度分求爻策者以爻限周因之如歲周而一為距至爻策捷法置距至度分以爻法因之得距至爻策置距朔距合及入厯交轉日分以歲周因之如各周而一得各度分求爻策者以爻限周因之如各周而一得各爻策捷徑法置距合距朔及入厯交轉日分各以其爻法因之得各爻策以距元積年因厯周歲差為厯周差積損厯應爻策為所求天正冬至入厯爻策加厯元厯周限為所求天正冬至厯周限爻策以距元積年因通閏爻法足爻限周纍去之為通餘爻策加厯元月平行得所求天正冬至月平行爻策置歲周足月離轉周纍去之餘因入轉爻法為通轉法與距元積年相因纍減爻限全周為轉餘爻策加轉應爻策得所求天正冬至月離入轉爻策用減月平行得所求天正冬至月離轉初限置歲周內減月離交周十三次餘因入求爻法曰通交法與距元積年相因足爻限周纍去之為交餘爻策加交應爻策得所求天正冬至月離入交爻策用減月平行得所求天正冬至月離正爻限置平朔距至爻策加月周日躔平行爻策得次朔距至爻策強望倣此置平朔弦望月離入轉爻策加轉差法得次朔弦望入轉爻策以轉半差法加平朔入轉爻策疾改遲遲改疾得平望入轉爻策有望求朔及兩弦互求者俱倣此置平朔望月離入交爻策加交差法得次朔望入交爻策五星各置其合周歲差以距元積年因之纍去爻限周為合周差餘各加合應爻策得所求天正冬至五星距合爻策歲填熒惑各以天正冬至距合爻策反減爻限周得所求天正冬至平行爻策以距元積年因五星入轉歲差為轉歲差積加厯元轉初限得所求天正冬至五星轉初限爻策歲填熒惑以減所得天正冬至平行爻策太白辰星反減爻限周各得所求天正冬至入轉爻策歲填熒惑以距元積年因入交歲差為交歲差積加厯元正交限得所求天正冬至正交限爻策以減所得天正冬至平行爻策得所求天正冬至入交爻策太白辰星以距元積年因入交歲差足爻限周纍去之為交差餘加交應爻策得所求天正冬至入交爻策用減爻限周得所求天正冬至正交限爻策置五星平合距至爻策加合周日躔平行得次周平合距至爻策置五星平合入轉爻策以轉差法加之入交爻策以交差法加之得次周平合入轉及入交各爻策日太白辰星以距至度為平行經度月以距朔度益距至度為平行經度歲填熒惑以距合度損距至度為平行經度爻策倣此又法月行爻法五星平行爻法因距至日分加天正冬至月五星平行爻策各得用時月五星平行爻策月距朔五星距合各爻法因距至日分加天正冬至距朔距合爻策得用時月距朔五星距合各爻策日躔入厯月五星入轉入交各爻法因距至日分加天正冬至入厯入轉入交爻策得用時日躔入厯月五星入轉入交各爻策月置平行經度損入交度為平交度五星置各平行經度損入交度為正交度爻策倣此平行分置歲周如月周及五星合周而一各為平離分用爻限者即距朔及距合爻法日太白辰星皆以一度為平行分月平離與一度相從歲填熒惑平離與一度相消各為平行用爻限者日太白辰星即距至爻法月歲填熒惑即平行爻法初末限日躔入厯月星入轉度在半周以下為朓以上去半周餘為朒爻視朓朒度不及象限者曰初限過象限者反減半周餘曰末限躔離定度朓朒差倍朓朒初末限辰星三倍之申其正弦為勾較弦加減朓朒準度為股倍度過象限者加不及者減辰星朒初朓末反是勾股求弦為初法法分勾為正弦得加減差日月歲填熒惑太白皆曰加差辰星朓初朒末下及紀限曰加差過紀限曰減差朒初朓末反是捷法置勾如股而一為切分得加減差申其界分因股得初法初法因朓朒準分為定用加減差加減初末限為定限定限正弦因定用為勾較弦因定用加減一度為股朓初朒末減朒初朓末加勾股求弦為逺近初分置勾如初分而一為正弦得朓朒差捷法置勾如股而一為切分得朒朓差申其界分因股得逺近初分次行置平行徑度以朓朒差朓益朒損之為次行月歲熒惑填各以次行與日躔次行相減為離度月倍之曰倍離太白辰星置距合度以朓朒差朓損朒益之為離度月倍離在半周以下為朓以上內減半周餘為朒五星離度倣是朓朒不及象限為初限過象限者反減半周餘為末限月離朓朒定差朓朒外準加定用曰次準倍離初末限正弦因外準為勾較弦因外準損益次準為股朓初朒末損朒初朓末益勾股求弦為後準置勾如後準而一為正弦得朓朒次差捷法置勾如股而一為切分得朓朒次差申其界分因股得後準以朓朒次差朓加朒減入轉度曰次轉又有加差加減之入轉度在初限者加末限者減仍依入轉度法求朓朒初末限申其正弦因後準為勾較弦因後準損益一度為股朒初朓末益朓初朒末損勾股求弦為逺近定分置勾如定分而一為正弦得朓朒定差捷法置勾如股而一為切分得朓朒定差申其界分曰股得逺近定分歲填熒惑後準以用時日躔入歷求其逺近分因三星朓朒中準為後準用新法會通崇禎厯書歲填即以中準為後準熒惑以用時日躔入厯求其逺近分與一度相減餘因朓朒中準曰日躔差次以熒惑入轉度準日躔入厯度中日躔逺近分與一度相減餘因熒惑朓朒中準又以外準因之曰入轉差以所得兩差視逺近分過一度者加不及者減各加減於中準為後準五星朓朒次差離度朓朒初末限正弦因後準為勾較弦因後準損益逺近初分為股朓初朒末益朒初朓末損勾股求弦為逺近次分置勾如次分而一為正弦得朓朒次差捷法置勾如股而一為切分得朓朒次差申準界分因股得逺近次分行定度日躔即以次行為行定度月離以朓朒定差朓加朒減其平行經度為行定度五星各以朓朒次差朓加朒減其次行為行定度五星次日行定度凡言次日上日者皆以子正為限等於上日者為留差在日度一分以下者俱為留段少於上日者為退月日五星各以次日行定度與上日行定度相較為定行分月日五星定行與日躔定行進相消退相從各為離日定行分氣朔定日四正置四仲中氣日躔朓朒差如定行而一得日差朓損朒益四仲中氣日分得四正日分定朔弦望置平朔弦望日月朓朒差同名相從日朓月朒同名為加月朓日朒同名為減異名相消日朓多應加月朓多應減日朒多應減月朒多應加為實月平離為法而一得加減泛差用以加減平朔弦望為前泛時置前泛時覆求加減次差復以加減平朔弦望為後泛時覆求加減後差與次差相減餘自因為實泛差次差相減餘為法而一得數損益其加減後差次差多於泛差者益少者損為加減定差以加減定差加減於平朔弦望得定朔弦望日分前後兩朔於同者前月大盡異者前月小盡兩朔間無中氣者為閏月五星定合退望五星行定度與日躔行定度相減逐日逐時細求之無餘分者即為定合餘半周者為退定望若未合者置其較分如離日定行而一得數加減用時為定合退望日分星行定度多者加日行定度多者減太白辰星順合反此歲填熒惑合前為夕合後為晨望前為晨望後為夕太白辰星順合前為晨合後為夕退合前為夕合後為晨內外緯度月離正交度月倍離初末限正弦因交周朓朒準分為勾較弦因交周朓朒準分損益一度為股朓初朒末損朒初朓末益勾股求弦為緯差法法分勾為正弦得行朓朒差倍離在朓限者交行為朒差倍離在朒限者交行為朓差亦曰屈申差朓差為申朒差為屈捷法置勾如股而一為切分得交行朓朒差申其界分因股得緯差法朓益朒損平交度為正交度月五星交定度月以正交損行定度為交定度五星以正交度損次行為交定度交定不及半周者為正交後其緯距南曰陽厯過半周者去半周餘為中交後其緯距北曰隂厯正交後過象限者反減半周餘為中交前中交後過象限者反減半周餘為正交前黃道內外度黃道距至度半周以下為冬至後以上去半周為夏至後冬至後過象限者