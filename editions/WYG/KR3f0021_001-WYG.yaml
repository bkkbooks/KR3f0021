body:
  text: 曉菴新法卷一吳江王錫闡撰勾股置四方形從兩隅斜分之損半為三邊之形形之兩邊從横相遇其隅中矩曰勾股横為勾從為股舊法短為勾長為股今不論短長但以從横為定斜行以兩端屬於勾股之端者曰弦此為勾股之弦與割圜法中全正較三弦異理勾股各為冪自因曰冪相從平方開之得弦數弦為冪勾股兩冪相從即弦冪以勾冪消弦冪為股冪即股自因數股冪消弦冪為勾冪即勾自因數各以平方開之得勾股之數假如勾數三股數四勾數自因得九為勾冪股數自因得一十六為股冪兩冪相從得二十五為弦冪平方開之得五為弦數餘倣此割圜置全圜四分之曰象限日度九十一度少強爻限九十六爻平限九十限六分之曰紀限日度六十一度弱爻限六十四爻平限六十限十分之曰專限日度三十六度半強爻限三十八爻四十策平限三十六限參分象限之一曰辰限日度三十度半弱爻限三十二爻平限三十限四分紀限之一曰氣限當辰限之半日度一十五度少弱爻限一十六爻平限一十五限參分專限之二曰髀限日度二十四度強爻限二十五爻六十策平限二十四限三百八十四分圜周之一曰爻限全周三百八十四爻其一爻當日度之九十五分有奇平限之九十三分太三百六十分圜周之一曰平限全周三百六十限其一限當日度之一度一分半弱爻限之一爻又三十分爻之二以歲周分圜周曰度限亦曰日度全周三百六十五度少弱其一度當爻限之一爻五策有奇平限之九十八分半強割圜周之一曰正弧即用弧隨所用大小不拘度分正弧與象限之較曰較弧置象限内減正弧得較弧弧之對邊與兩端屬於弧之兩端者曰全弦全弦之半為其半弧之正弦正弦亦曰正半弦既得正弦復置半弧為正弧正弦與半徑為勾弦求股為較弧之正弦亦為正弧之較弦較弦損半徑為矢矢與正弦為勾股得全弦置半徑内減較弦得矢矢為勾正弦為股勾股求弦得正弧全弦半之又為半弧之正弦用此法可以遞損半弧求其正弦圜之全徑為半周全弦二度半徑為象限正弦亦為紀限全弦一度自為勾股得象限全弦一度自因倍為實平方開之得一度四十一分四十二秒一十三㣲半強即象限全弦全徑為冪四分去一三度平方開之得倍紀全弦倍紀當日度之一百二十一度太弱爻限之一百二十八爻平限之一百二十限其全弦得一度七十三分二十秒五十微太強半之為紀限正弦八十六分六十秒二十五微半弱四分全徑之一為勾五十分半徑為股求弦去勾為專限全弦六十一分八十秒三十四㣲弱其冪與半徑之冪相從平方開之得倍專全弦倍專當日度之七十三度強爻限之七十六爻八十策平限之七十二限其全弦得一度一十七分五十五秒七十㣲半強半之為專限正弦五十八分七十七秒八十五㣲少強紀限專限正弦相損為股兩正弦數俱見上相損存二十七分八十二秒四十微弱較弦相損為勾紀限較弦五十分專限較弦八十分九十秒一十七㣲弱相損存三十分九十秒一十七㣲得髀限全弦勾股求弦得四十一分五十八秒二十三㣲半弱即髀限全弦有不齊之兩弧互以正弦因較弦相從為兩弧相益之正弦相消為兩弧相損之正弦倍正弦因較弦為倍弧之正弦各隨用弧大小不拘度分中分紀限全弦為辰限正弦五十分置辰限求全弦五十一分七十六秒三十八微強半之為氣限正弦二十五分八十八秒一十九微強以弦矢術遞損其半至四分爻限之一之正弦而止四分爻限之一得二十五策其正弦四十秒九十微半強以二十五為法分之為百分爻限之一之正弦百分爻限之一即一策其正弦一秒六十三微半強用兩弧損益之術得三百八十四爻及諸策之正弦又法置髀限以弦矢術遞損其半至二十分爻限之一即五策之正弦而止其數八秒一十八微強為實五策為法而一亦得百分爻限之一之正弦半徑因正弦為實較弦為法而一得外切圜分省曰切分半徑自因為實較弦為法而一得割圜界分省曰界分較弧損半其切分如正弧切分即正弧界分較弧損半其切分減正弧界分即正弧切分命半徑為一度諸率以半徑為法因之者可免因法以半徑為法而一者可免分法後俱從省當日度之五十八度有奇爻限之六十一爻有奇平限之五十七限少強其一分當日度之五十八分有奇爻限之六十一策有奇平限之五十七分少強徑一則圍三有奇圍三則徑一不足命全徑為二度得圍法六度二十八分三十二秒不足用分全周得本文諸數變率正弧過一象限者與半周相消設有正弧一百爻是為過一象限之弧與半周初減存九十二爻餘倣此過半周者内損半周設有正弧二百爻是為過半周之弧内減半周存八爻餘倣此至三象限已上者與全周相消設有正弧三百爻是為三象限已上之弧與全周相減存八十四限各以所存之弧代正弧求弦矢諸數割圜器表止一象限而全周之為象限者四故正弧過一象限已上者與全周半周相減以所存之弧求正較弦矢切分界分通率有日度求爻限者以爻限周因之如歲周而一爻限周三百八十四每度得一爻五策一十三分五十七秒少弱有爻限求平限者以平限周因之如爻限周而一平限三百六十每爻得空限九十三分七十五秒有平限求日度者以歲周因之如平限周而一每限得一度一分四十五秒六十一微半強若反求者以因法為分法分法為因法有日度求平限者以平限因之如歲周而一每度得空限九十八分五十六秒四十七微少強有平限求爻限者以爻限周因之如平限周而一每限得一爻六策又參分策之二有爻限求日度者以歲周因之如爻限周而一每爻得空度九十五分一十一秒五十一微半強自一度以上因陟而上分降而下自一度以下因降而下分陟而上假如一度以上者以三度因四度得一十二度故曰因陟而上以四度分三度得百分度之七十五故曰分降而下又如三度之冪得九度四度之冪得一十六度因陟而上也置九度平方開之得三度置一十六度平方開之得四度分降而下也餘倣此假如一度以下者以百分度之二十因百分度之一十得百分度之二故曰因降而下以百分度之一十分百分度之二十得二度故曰因陟而上又如百分度之五十其冪得百分度之二十五因降而下也置百分度之二十五平方開之得百分度之五十分陟而上也餘倣此曉菴新法卷一
