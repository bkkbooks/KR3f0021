行差刻分損益次汎時遞求之至兩數齊分而止得掩食初終二限定時㨗法行差不及十分刻之一者即以損益其汎時得定時初終二限定時各與正合定時相減為定用分兩定用相從得掩食中積日刻分凌犯初終二限置凌犯諸數依掩食初限法得凌犯初限定時依掩食終限法得凌犯終限定時凌犯初終二限定時與正合定時相消為初終二限各定用分兩定用相從得凌犯中積日刻分掩食凌犯方位順厯主星準日躔客星準月離依日食法得汎向及次向逆厯主星準日躔客星準太白依太白食日法得汎向及次向正合先定合者依初限法後定合者依終限法各得次向四限兩曜交分凌犯初終二限掩食初終二限為四限各與象限為較得差較分損益次向為初終定向經順厯緯陽厯初限益終限損緯隂厯初限損終限益經逆厯緯陽厯初限損終限益緯隂厯初限益終限損正合以象限損益次向為掩食凌犯定向其損益視正合定時先定合者依初限法後定合者依終限法月星相犯視終初二限定向不及半周者益半周過半周者内損半周初限為星入月定向終限為星出月定向轉時變差用時次經與本時前後次經各相較如用時在子初以其次經前與亥正次經相減後與子正次經相減餘倣此大小同名者兩次經或皆大於用時次經或皆小於用時次經即為轉時每間一刻求其平距至損益之交漸増復減漸減復増之際即為轉刻置轉刻與前後時相較為法如子初二刻與前時亥正相較得六刻又六分刻之一為法與後時子正相較得二刻又六分刻之一為法餘倣此轉刻平距與前後時平距相較為轉時較如法而一各為轉時變差用時在轉時者以轉時變差代時差法用之用時在轉刻前者用轉刻前變差在轉刻後者用轉刻後變差重合正合後不及終限行差復大於先掩食凌犯行分大於平距而後刻分行差復大於先刻分行差及合前合後主客次經大小同名者客星次經合前大於主星合後亦大合前小於主星合後亦小是為同名皆有重合行差復大者以先得行差半之為較法以汎用加正合時求得行差為先得行差前後次經大小同名者置平距如時差法而一與汎用相從半之為較法較法損汎用加正合定時為轉際前汎時四分較法之一曰節率進退轉際前汎時為先後二節各求其行差又求前汎時行差減之若先節在正合前其行差與前汎時行差相加後節次經與前汎時異名者兩行差亦相加為行差較兩較相從為法相消因節率為實實如法而一為損益差先節行差小於後節為損差大於後節為益差若兩行差相加為較者反是一加一減者先節加為損差後節加為益差損益前汎時為轉際次汎時四分節率之一為次汎時節率進退次汎時為前後二節依前汎時法得損益差自因如前汎時損益差而一與次汎時損益差相加減兩差損益同名為加異名為減為損益定差損益次汎時為轉際定時以掩食轉際定時兩曜定距減用數餘為轉際食限如用數而一為掩食淺深分秒置凌犯轉際定時兩曜定距如法數而一得凌犯逺近寸分置轉際定時内減正合定時為轉前定用刻分以加轉際定時得重合前汎時依正合法順厯改逆逆厯改順下倣此得重合定時仍與轉際定時相減得轉後定用依正合後終限法得重合後終限定時内減重合定時得終限定用刻分初終二限定時相減得掩食凌犯中積刻分有犯無合無正合時而兩曜定距小於用數者為有犯無合用時後行差漸多者其用時在轉際前漸少者其用時在轉際後以用時行差刻分損益用時轉際前損轉際後益為初限或終限前汎時損為初限益為終限依法求之得定時為先得定時置先得定時掩食凌犯行分或初限定時或終限定時如時差法而一為汎用加減先得定時求行差刻分損半為較法較法減汎用餘以損益先得定時終限以損初限以益為轉際前汎時依前節法得轉際定時與先得初終定時相減為初終定用依前節法得掩食淺深分秒凌犯逺近寸分置轉際定時損益先得定用先得初限者此益轉際為終限先得終限者此損轉際為初限為初限或終限前汎時復依前法求之順厯改逆逆厯改順得定時為後得定時與轉際定時相減為後得初終定用先後兩定用相從為掩食凌犯中積刻分升降掩食凌犯在升降之際者以月星赤道升降度與日躔赤道升降度相減為升降較置升降較如赤道離日日周而一為升降先刻分損益日出入時為月星升降前汎時月星升降赤道過於日躔者益小於日躔者損下倣此置前汎時真刻分覆求升降次刻分損益日出入時為後汎時復求其真刻分求升降後刻分次後兩刻分之較自因如次刻分而一加減後刻分次刻分大於先刻分者加小於先刻分者減為進退定分進退日出入時得月星升降定時凡掩食凌犯皆從先降後升一曜求升降時唯月星相掩從月離求升降時以掩食升降定時兩曜定距損用數餘為升降時掩食限不及損者升降時無掩食如用數而一得升降時掩食分秒置凌犯升降定時兩曜定距如法數而一得凌犯相距寸分定距大於凌犯用數者升降時無凌犯升降定時與初終二限定時相減為掩食凌犯内外刻分升定時與終限定時相減降定時與初限定時相減各得掩食凌犯當見刻分即為掩食凌犯外分以減掩食凌犯中積得不見刻分即為掩食凌犯内分置升降定時依法求得定向即為升降時掩食凌犯方位昏旦隠見掩食凌犯在早晚者以昏明中界為隠見時諸星大小不齊隠見先後亦不等不勝悉辨今但以昏明中界為中數月歲太白不在此限以隠見時準升降定時依前節諸法得隠見時掩食淺深凌犯逺近及方位内外刻分交會辰次赤道宿度置三辰交會諸限赤道經度日月星曰三辰日月食皆曰交會今以太白入日及凌犯掩食附之日月食食甚初虧復明食既生光合環分環七限太白食日食中入日出日全入初出五限掩食凌犯各正合初終轉際重合五限以近少赤道宿積損之得各曜躔離赤道宿次度分黄道宿次置三辰交會諸限黄道經度以近少黄道宿積減之得各曜躔離黄道宿次度分又置各曜赤道上黄道積度以赤道上黄道宿積近少者損之得各曜躔離赤道上黄道宿次度分辰次各曜躔離宿次所在宮舍即為躔離辰次若一宿兩辰者視躔離宿次度分在宮界以下為前辰以上為次辰曉菴新法卷六
