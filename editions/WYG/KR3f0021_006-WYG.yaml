body:
  text: 曉菴新法卷六吳江王錫闡撰日食南北較差日南北差與月南北差同向相消異向相從曰南北較差月星緯加黄道中限髙不及象限者即為視差同背過象限者以月星緯正弦因月星距中黄道較弦得數大於中限髙較弦為視差異向小於中限髙較弦為視差同向東西較差月東西差損益月離黄道為先數月離中前為益中後為損凡以月星東西差為損益者皆從月星中前中後為定日東西差損益月離行定為次數日躔中前為益中後為損凡以日東西差損益者皆從日躔中前中後為定兩數相消曰東西較差食甚定時置定朔定刻分東西較差如月離日定行分而一得時差前汎分中前為損差中後為益差下皆同損益定刻分為食甚前汎時欲求真刻分以氣差反損益之下皆同置前汎時先以真刻分求日月經緯諸數次以定刻分求髙度視差諸數篇内俱倣此凡經緯髙度視差諸數各就本時求之篇内皆同覆求時差定汎分與求前汎分同法下倣此損益定朔定刻分為食甚後汎時置後汎時覆求時差後汎分與次汎分相減餘自因為實前次兩汎分相減餘為法而一加減後汎分次汎分多於前汎分者為加前汎分多於次汎分者為減為時差定分損益定朔為食甚定時損益定朔真刻分得食甚定時真刻分以求經緯諸數損益定朔定刻分得食甚定時定刻分以求髙度視差諸數凡以大小餘命日時者皆定刻分如欲密求者再以時差後汎分損益定朔依前法復求時差與後汎分相減餘自因為實次後兩汎分相減餘為法而一得數視後汎分多者加次汎分多者減加減末所得時差為定分更欲密者推此法累求之日食分秒食甚定時南北較差損益月緯視差異背者皆為益視差同背者南緯益北緯損如不及損即反損之餘為南緯若黄道中限在天中北者反是後皆倣此曰定緯南曰陽厯北曰隂厯食甚定時日月兩晨昏徑分凡日月晨昏徑及闇虚月星徑分各就本時求之篇内皆同相從損半曰日食用數内損定緯為日食限不及損者不食如本時晨昏日徑而一得日食分秒初虧復明食甚定時用數正弦與定緯正弦為勾弦求股為正弦得日食行分損益交定初虧損復明益初虧復入交各求緯度損益南北較差損益與日食分秒法同為定緯其正弦仍與用數正弦為勾弦求股為正弦得初虧復明行分如月離日定行而一為虧復泛用刻分損益食甚定時初虧損復明益為虧復前汎時以上諸數俱從食甚定時置虧復前汎時黄道距日度以下諸數各從本時如初虧前汎時即從初虧前汎時諸數復明前汎時即從復明前汎時諸數餘倣此以東西較差損益之初虧中前損中後益復明中前益中後損初虧在朔後復明在朔前者以黄道距日度東西較差初虧有日躔中前月離中後者復明有月離中前日躔中後者皆以東西較差益月離黄道距日度為日月次距如汎用分而一曰時差法虧復前汎時南北較差損益月緯為定緯其正弦為勾用數正弦為弦此用數即以前汎時日月兩晨昏徑分相從損半得數後皆倣此勾弦求股為正弦得前汎時虧復行分與次距相減餘為行差如時差法而一為行差刻分次距強於虧復行分者初虧為益差復明為損差虧復行分強於次距者初虧為損差復為益差後皆倣此損益前汎時為虧復次汎時以虧復次汎時覆求次距及虧復行分兩數相較無餘分者即以次汎時為定時若未齊者復求行差刻分求時差法之術與前汎時同但以虧復次汎時與食甚定時相較為汎用刻分後皆倣此損益次汎分覆求之至虧復行分及次距齊分而止得初虧復明定時行差在一分以下者置為實如時差法而一為刻分損益汎時即為定時初虧與復明定時與食甚定時相减為初虧復明各定用分兩定用相從為日食中積分既内日食至十分者曰既以上為既内以日晨昏徑分損用數此晨昏徑及用數皆從食甚定時金環倣此為既内用數依初虧法求之得食既定時依復明法求之得生光定時各以食甚定時相減為食既生光兩定用分兩定用相從為既内中積與日食中積相消為既外刻分食既生光經緯髙度視差及兩晨昏徑用數皆各從其汎時定時真定刻分求之金環分環合環倣此金環日食限大於月徑者食有金環以月徑損用數為金環用數如日徑而一得金環周廣分秒此日月兩徑即食甚定時晨昏徑分依初虧法得合環定時依復明法得分環定時其合環已前分環以後缺處為玦口合環分環兩定時與食甚定時相減為合環分環各定用分兩定用相從為金環中積分日食方位置七限日躔黄道度初虧食既合環食甚分環生光復明為七限與午位黄道相減為日躔距午度次以午位及日躔兩黄道髙度較弦相因為先數正弦相因為次數與距午較弦相減距午較弦大於次數者下所得弧小於象限距午較弦小於次數者下所得弧大於象限若距午黄道過一象限者不論其較弦與次數大小下所得弧皆過一象限月體光魄汎向法亦同為後數如先數而一為較弦其弧與半周午前相從午後相消為汎向若午中從黄道在天中北者午前以所得弧損全周為汎向午後即以所得弧為汎向初虧以黄道髙度交分中後損汎向中前反減半周餘損汎向各為次向食既合環倣此午中兩黄道在天中北者以黄道髙度交分中後益汎向中前從半周損汎向各為次向復明以黄道髙度交分中前益汎向中後反減半周餘益汎向各為次向生光分環倣此午中兩黄道在天中北者以黄道髙度交分中後益汎向中前從半周益汎向各為次向食甚定時中前依初虧法中後依復明法各得次向置六限定緯正弦日食七限除食甚為六限如三用數正弦而一初虧復明各從本時日食用數食既生光各從本時既内用數合環分環各從本時金環用數是為三用數仍為正弦得差較分用以損益次向初虧緯南益緯北損復明緯南損緯北益食既合環同初虧分環生光同復明為晦體定向食既生光為明體定向合環分環為玦口定向食甚定時以象限損益次向中前緯南益緯北損中後緯南損緯北益為晦體定向置晦體定向損益半周過半周者損不及半周者益為明體定向食既生光置明體定背損益半周為晦體定向食甚定時日月兩晨昏半徑正弦各自因相減如定緯正弦而一為先數日徑大於月徑者内言日月徑皆食甚定時晨昏徑分先數加定緯正弦為次數日徑小於月徑者以先數損定緯正弦不及損者反損之下所得晦界過一象限為次數置次數如日徑全弦而一為較弦得晦界度分用以損益晦體定背為晦明定帶食日食在早晚者以日出入時定緯正弦為勾日月次距正弦為股日食在早從日出時日食在晚從日入時勾股求弦為正弦得日月定距以損本時日食用數為帶食限不及損者無帶食如日晨昏徑而一得帶食分秒食甚時在晝者曰帶食内分在夜者曰帶食外分食在早者以初虧定時減日出時不及減者無帶食餘為不見食刻分與日食中積相消為見食刻分食在晚者以日入時減復明定時不及減者無帶食餘為不見食刻分與日食中積相消為見食刻分帶食方位置日出入時視在食甚前者準初虧食甚後者準復明求得汎向及次向以帶食定距準日食用數求得差較分損益次向損益與求虧復方位法同為帶食定向月徑變差置光徑準度如日逺近中準而一曰光徑準分與日視徑中準相減曰日徑較分月視徑中準因之如月晨昏徑正弦而一曰晨昏較分北極髙矢冪因晨昏較分曰日徑加差加日視徑中準以日晨昏徑正弦因之如日視徑中準而一曰晨昏光徑準分月晨昏徑正弦因日晨昏徑正弦如晨昏光徑準分而一為正弦得里差變徑又曰月晨昏定位凡求日食唯赤道之下止用月晨昏徑其餘各方皆當用月晨昏定徑右以北極髙下求里差變徑亦約畧可得但四時有寒暑燥溼之異九服有平原山澤之分以及雲霞之類皆能變易月徑當隨地隨時測定用之未可執一以為成法故不著於正文而附見章末云月食食甚定時置定望月離黄道經度與日躔行定度相減餘如月黄道離日定行分而一為時差分損益定望真刻分交前益交後損為食甚定時真刻分復以氣差損益之為食甚定時定刻分凡求經緯及闇虚月徑諸數皆從真刻分凡求髙度視差方位及命日命時皆從定刻分章内皆同月食分秒食甚定時月徑分篇内日食凌犯諸法皆用日月晨昏徑唯月食法止用月徑分與闇虚相從損半為月食用數内損月距日定度為月食限緯南為陽厯緯北為隂厯不及損者不食如月徑而一為月食分秒初虧復明食甚定時月食用數及月緯兩正弦各為冪相消平方開之為正弦得月食行分損益交定度初虧損復明益為虧復入交求緯度其正弦為冪以消用數冪平方開之為正弦得初虧復明行分如月黄道離日定行而一為虧復汎用刻分損益食甚定時真刻分初虧損復明益為虧復前汎時以上諸數俱從食甚定時置虧復前汎時月緯及用數兩正弦以下諸數各從本時求之此用數即以前汎時月徑闇虚相從損半得數後皆倣此各為冪相消平方開之為正弦得平距亦名前汎時虧復行分與月離黄道距日度相減餘為行差如月黄道離日定行分而一為行差刻分損益前汎時平距大於黄道距日度者初虧損復明益平距小於距日度者初虧益復明損為虧復次汎時以次汎時覆求行差刻分損益次汎時此損益與前汎時同法為初虧復明定時真刻分又以氣差損益之得初虧復明定時定刻分初虧復明定時與食甚定時相減得初虧復明各定用分兩定用相從為月食中積刻分既内月食至十分曰既以上為既内以月徑損月食用數此月徑及用數皆從食甚定時餘為既内用數依初虧法得食既定時依復明法得生光定時各與食甚定時相減為食既生光定用分兩定用相從為既内中積刻分與月食中積相減為既外刻分月食更㸃置夜定刻五而一為更率倍更率十而一為㸃率置日入時以㸃率遞加之得各更㸃刻分凡更㸃皆用算内如日入時加㸃率二次即為一更三㸃加㸃率五次即為二更一㸃之類餘倣此月食五限刻分初虧食既食甚生光復明為五限在各更㸃刻分以上者即為所交更㸃假如日入時七十五刻即得夜刻五十以一十刻為更率二刻為㸃率置日入時七十五刻加更率一次得八十五刻為二更一㸃又加㸃率一次得八十七刻為二更二㸃視五限刻分在八十五刻以上即交二更一㸃八十七刻以上即交二更二㸃餘倣此一更二㸃以内曰昏分五更三㸃以外曰晨分通曰晨昏分又曰昏明分月食方位置五限月離黄道與午位黄道相減為月離距午度依日食法得汎向初虧以黄道髙度交分中前益汎向中後反減半周餘益汎向復明以黄道髙度交分中後損汎向中前反減半周餘損汎向各為次向若午中兩黄道在天中北者初虧依日食復明法復明依日食初虧法各得汎向食既法同初虧生光法同復明食甚先定望者依初虧法後定望者依復明法各得次向置四限月緯正弦月食五限去食甚為四限如兩用數正弦而一初虧復明各從本時月食用數食既生光各從本時既内用數是為兩用數仍為正弦得差較分用以損益次向其損益與日食相同為晦體定向食既生光為明體定向食甚以象限損益次向食甚定時在定望前者緯南益緯北損定望後者緯南損緯北益為晦體定向置晦體定向損益半周與日食同法為明體定向食既生光置明體定向損益半周為晦體定向食甚定時月闇虚兩半徑正弦各自因相減如月緯正弦而一為先數用損月緯正弦不及損者反損之下所得晦界過一象