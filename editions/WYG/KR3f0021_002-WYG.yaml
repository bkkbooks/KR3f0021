  text: 曉菴新法卷二吳江王錫闡撰法數度法度法百分分秒㣲纎塵芒末遞以百為法爻法百策策法百分分秒以下俱倣此日法紀法六十日十干甲乙丙丁戊己庚辛壬癸十二支子丑寅卯辰巳午未申酉戌亥干支互配得六十故紀法六十日宿紀總法四百二十日又以二十八宿與十干十二支互配得四百二十故宿紀總法四百二十日日法百刻刻法百分分秒以下倣此時法八刻又參分刻之一黄道諸數天周周天三百六十五度二十五分六十五秒五十九㣲三十二纎半周一百八十二度六十二分八十二秒七十九㣲六十六纎象限九十一度三十一分四十一秒三十九㣲八十三纎内外準内外準分三十九分九十一秒四十九纎内外準分古今消長不同别見補遺内外次準九十一分六十八秒八十六微歲差黄道歲差一分四十三秒七十三微二十六纎一策又九十分策之四十六歲差消長古今不同别見補遺列宿距星黄道經緯角一十度七十三分七十九秒一十一爻二十八策又九分策之八南二度一分二十三秒二爻一十一策又九分策之五亢一十度八十二分二十四秒一十一爻三十七策又九分策之七北三度一分一秒三爻一十六策又九分策之四氐一十八度一十六分一十四秒一十九爻九策又三分策之一北四十三分九十六秒四十六策又九分策之二房四度八十三分六十三秒五爻八策又九分策之四南五度四十六分一十九秒五爻七十四策又九分策之二心七度六十六分二秒八爻五策又三分策之一南三度九十七分三十八秒四爻一十七策又九分策之七尾一十五度八十二分七十八秒一十六爻六十四策南一十五度二十一分九十秒一十六爻箕九度四十六分九十六秒九爻九十五策又九分策之五南六度五十九分四十九秒六爻九十三策又三分策之一右東宫蒼龍七宿七十七度五十一分五十六秒南斗二十四度一十九分八十二秒二十五爻四十四策南三度八十八分九十三秒四爻八策又九分策之八牽牛七度七十九分五十五秒八爻一十九策又九分策之五北四度七十五分一十七秒四爻九十九策又九分策之五婺女一十一度八十二分二秒一十二爻四十二策又三分策之二北八度二十八分五十九秒八爻七十一策又九分策之一虚一十度一十二分九十一秒一十爻六十四策又九分策之八北八度八十二分七十秒九爻二十八策危二十度四十一分四秒二十一爻四十五策又九分策之七北一十度八十五分六十二秒一十一爻四十一策又三分策之一營室一十五度九十一分二十三秒一十六爻七十二策又九分策之八北一十九度七十一分七十一秒二十爻七十二策又九分策之八東壁一十一度六十八分四十八秒一十二爻二十八策又九分策之四北一十二度七十六分七十二秒一十三爻四十二策又九分策之二右北宫𤣥武七宿一百一度九十五分五秒奎一十三度四十二分六十六秒一十四爻一十一策又九分策之五北一十八度五分一十八爻九十八策又三分策之二婁一十三度一十八分九十八秒一十三爻八十六策又三分策之二北八度六十分七十二秒九爻四策又九分策之八胃一十三度二十分六十七秒一十三爻八十八策又九分策之四北一十一度四十三分一十二秒一十二爻一策又九分策之七昴八度六十分七十二秒九爻四策又九分策之八北四度五分八十四秒四爻二十六策又三分策之二畢一十五度一十一分七十六秒一十五爻八十九策又三分策之一南三度四分三十八秒三爻二十策觜觿一十一分八十四秒一十二策又九分策之四南一十三度八十六分六十三秒一十四爻五十七策又九分策之七參一十二度二分三十秒一十二爻六十四策南二十四度九十二分五十四秒二十六爻二十策又九分策之四右西宫白虎七宿七十五度六十八分九十三秒東井三十度八十六分八秒三十二爻又四十五分爻之二十南八十九分六十二秒九十四策又九分策之二輿鬼四度六十六分七十二秒四爻九十策又三分策之二南八十一分一十七秒八十五策又三分策之一柳一十七度二十四分八十二秒一十八爻一十三策又三分策之一南一十二度六十三分一十八秒一十三爻二十八策七星八度五十分五十七秒八爻九十四策又九分策之二南二十三度七十二分七十一秒二十三爻八十九策又三分策之一張一十八度三十三分五秒一十九爻二十七策又九分策之一南二十六度五十八分二十六秒二十七爻九十四策又三分策之二翼一十七度二十四分八十二秒一十八爻一十三策又三分策之一南二十三度一分四十六秒二十四爻一十九策又九分策之五軫一十三度二十四分五秒一十三爻九十二策南一十四度六十二分七十三秒一十五爻三十七策又九分策之七右南宫朱鳥七宿一百一十度一十分一十一秒赤道辰次附子元枵之次亥娵訾之次戌降婁之次酉大梁之次申實沈之次未鶉首之次午鶉火之次已鶉尾之次辰壽星之次卯大火之次寅析木之次丑星紀之次日躔諸數歲周歲周三百六十五日二十四刻二十一分八十六秒六㣲歲周消長古今不同别見補遺半周一百八十二日六十二刻一十分九十三秒三㣲象限九十一日三十一刻五分四十六秒五十一㣲五十纎氣策一十五日二十一刻八十四分二十四秒四十二㣲候策五日七刻二十八分八秒一十四㣲土王策三日四刻三十六分八十四秒八十八㣲四十纎盈策一日一刻四十五分六十一秒六十二微七十九纎四十四塵距至爻法一爻五策一十三分五十七秒一十九微諸率俱隨歲周消長古今不同别見補遺厯周厯周三百六十五日二十五刻四十八分六