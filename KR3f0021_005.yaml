body:
  text: 曉菴新法卷五吳江王錫闡撰氣差日躔平行經度與赤道經度相減餘如赤道日周而一得氣差刻分赤道經度強於平行者為損差平行經度強於赤道者為益差損益日下小餘分為定刻分益足百刻者其大餘進一日不及損者加百刻損之其大餘退一日小盡之月遇次月合朔進一日者其月改大盡大盡之月遇月合朔退一日者其月改小盡閏月因夲月退朔得中氣在朔者移閏於前一月因次月進朔得中氣在夲月之晦者移閏於後一月先有定刻分求真刻分者如前兩篇所求日下小餘皆為真刻分其損益反用之凡求經緯諸數皆用真刻分如前兩篇諸法凡求視差諸數以距午距中分斜正多寡者皆用定刻分如本篇諸法視差午位黄赤道先以用時真刻分求得七政黄赤兩道内外經緯諸度分置用時定刻分與五十刻相較為距午刻分用時定刻分不及五十刻者為午前過五十刻者為午後以全周因之為距午赤道度損益日躔赤道經度午前損午後益為午位赤道度其正弦因内外次準為法法分較弦為勾一度為股勾股求弦弦分勾為較弦得午位黄道度㨗法午位赤道較弦因較弧界分如内外次準而一為較弧切分得午位黄道又法以較弧切分如内外次準而一為較弧切分得午位黄道求其内外度損益北極髙内度損外度益與象限相減得午位黄道髙黄道午中差極交分較弦因午位黄道髙較弦如正弦而一為勾一度為股勾股求弦弦分勾股為正弦得黄道午中差㨗法極交分較弦因午位黄道髙較弧切分為切分得午中差黄道中限置午位黄道以午中差損益之午位黄道在半周以下者益以上者損為黄道中限度與七政黄道經度相較得各曜距中度中限度強於七政經度為中後七政經度強於中限度為中前黄道中限髙極交分正弦因午位黄道髙較弦為較弦得黄道中限髙黄道髙度及交分黄道中限髙正弦因距中較弦為正弦得日月星黄道髙度其較弦分中限髙較弦為正弦得髙度交分日月星髙度及交分日躔髙度及交分即以黄道為定月星緯度正弦因黄道髙較弦為先數緯度較弦因黄道髙正弦為次數黄道髙度交分正弦因先數為後數損益次數月星緯北者益緯南者損為正弦得月星髙度黄道髙度較弦因黄道髙交分較弦如月星髙較弦而一仍為較弦得月星髙交分月星髙交黄道分月星緯正弦為實交分正弦因月星緯較弦為法而一為勾一度為股勾股求弦弦分勾為正弦得月星髙距黄道分置月星緯切分如交分正弦而一為切分得月星髙距黄道分置月星緯正弦如月星髙距黄道正弦而一仍為正弦得月星髙交黄道分三差置七政髙度較弦如逺近定度而一為正弦得通差七政髙度交黄道分正弦日躔即黄道髙交分下倣此因通差正弦仍為正弦得南北差七政髙度交黄道分較弦因通差正弦為正弦得東西差晨昏日月徑晨昏徑差置逺近定度去一度曰距地度日月髙度較弦為勾較矢加距地度為股勾股求弦曰距人度如逺近定度而一為晨昏逺近定分與一度相減餘以日月徑分正弦因之如晨昏逺近定分而一為晨昏徑差晨昏逺近定分過一度者為損差不及一度者為益差㨗法距人度與逺近定度相減餘因日月徑分正弦如距人度而一得晨昏徑差晨昏徑分以晨昏徑差損益日月徑正弦仍為正弦得晨昏日月徑分月體光魄定向汎向月離黄道與午位黄道相減為黄道距午度月離黄道強於午位黄道為午前午位黄道強於月離黄道為午後次以午位及月離兩黄道髙度較弦相因為先數正弦相因為次數用次數損距午較弦不及損者反損之下所得弧過象限為後數如先數而一為較弦其弧與半周午前相從午後相消為汎向起子中位算外後皆同次向朔後者以黄道髙度交分中前加汎向中後反減半周餘加汎向望後者以黄道髙度交分中後減汎向中前反減半周餘減汎向各為次向定向月緯度正弦如距日定度正弦而一為正弦得差較分用以損益次向朔後緯南損緯北益望後緯南益緯北損為魄體定向加半周為光體定向又損益一象限為光魄界定向變差附赤道厯元以南以里差損北極應不及損者反損之餘為南極出地度其地在赤道南凡以内外度論損益者皆反用之如第四篇第一章晝夜差改用春正後損秋正後益損益五十刻為晝刻分又如第四篇第四章日躔升降差改用春正後升益降損秋正後升損降益損益其赤道經度為日躔赤道升降度月星升降差改用内度升益降損外度升損降益損益其赤道經度為月星赤道升降度又求日入地度法以日躔内外度益南極髙為外較損南極髙為内較兩申其較弦相從損半因先數視日躔在赤道南者損内較赤道北者損外較各較弦為正弦得日入地度凡用北極髙者皆改從南極髙反用損益即得黄道午位黄道行赤道内度強於北極髙者内去北極髙度餘與象限相減為午位黄道髙其午位及中限兩黄道皆在天中之北地在赤道南者午中兩黄道皆在天中北唯午位黄道行赤道外度強於南極髙者内去南極髙度餘與象限相減為午位黄道髙其午中兩黄道皆在天中南凡以黄緯南北論損益者皆反用之如本篇第二章午中差改用午位黄道在半周以下損以上益損益午位黄道為黄道中限度又求月星髙度所得後數改用緯南為益緯北為損損益次數為月星髙正弦又如本篇第四章求汎向其所得弧午後者即為汎向午前者與全周相減餘為汎向又求次向朔後者以黄道髙度交分中前減汎向中後從半周加汎向望後者以黄道髙度交分中後加汎向中前從半周損汎向各為次向唯求定向者全用正文雖有南北緯度不從變差損益凡午中在黄道天中南者皆從正文午中兩黄道在天中北者皆從變差曉菴新法卷五
